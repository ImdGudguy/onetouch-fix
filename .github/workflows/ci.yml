name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web build (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  agent:
    name: Agent build (.NET 8)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build service
        run: dotnet build agent/IntelliFix.Service/IntelliFix.Service.csproj -c Release
      - name: Build consent tray (WPF)
        run: dotnet build agent/IntelliFix.Tray/IntelliFix.Tray.csproj -c Release
