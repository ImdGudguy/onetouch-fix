name: Release Agent

# Tag a version (e.g. v1.0.0) to build the Windows agent and publish the
# installer bundle to GitHub Releases. The dashboard's Download / one-line
# installer pull from the 'latest' release asset.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-agent:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build self-contained agent bundle
        shell: pwsh
        run: ./agent/build-agent.ps1
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: agent/dist/IntelliFix-Agent.zip
          name: IntelliFix Agent ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            Self-contained IntelliFix Windows agent (Service + consent Tray) and install scripts.
            Install with the one-liner from your dashboard, or download and run `install-agent.ps1`.
            See AGENT.md.
